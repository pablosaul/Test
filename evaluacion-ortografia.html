<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación de Ortografía — Equipo Editorial</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0e;
    --surface: #1a1a18;
    --border: #2e2e2a;
    --accent: #e8d5a3;
    --accent2: #c44b2b;
    --text: #f0ece0;
    --muted: #7a7a6e;
    --correct: #4a8c5c;
    --wrong: #c44b2b;
    --font-display: 'Playfair Display', serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(196,75,43,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(232,213,163,0.04) 0%, transparent 50%);
  }

  .shell {
    width: 100%;
    max-width: 740px;
  }

  /* ── PORTADA ── */
  #cover {
    text-align: center;
    padding: 4rem 2rem;
    border: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  #cover::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    border: 1px solid rgba(232,213,163,0.1);
    border-radius: 50%;
  }
  #cover::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -80px;
    width: 260px; height: 260px;
    border: 1px solid rgba(196,75,43,0.12);
    border-radius: 50%;
  }
  .cover-tag {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  #cover h1 {
    font-family: var(--font-display);
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    font-weight: 900;
    line-height: 1.05;
    color: var(--accent);
    margin-bottom: 1rem;
  }
  #cover p {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 300;
    margin-bottom: 2.5rem;
    line-height: 1.6;
  }
  .cover-stats {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-bottom: 3rem;
  }
  .stat {
    text-align: center;
  }
  .stat-n {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }
  .stat-l {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .name-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .name-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    flex: 1;
    min-width: 180px;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-row input:focus { border-color: var(--accent); }
  .name-row input::placeholder { color: var(--muted); }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 1rem 2.5rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* ── QUIZ ── */
  #quiz { display: none; }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
  }
  .q-counter {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .q-counter span { color: var(--accent); font-weight: 500; }

  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .timer-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #timer {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--accent);
    min-width: 2.5rem;
    text-align: right;
    transition: color 0.3s;
  }
  #timer.urgent { color: var(--accent2); animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  .progress-bar {
    height: 3px;
    background: var(--border);
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 2rem 1.75rem;
    min-height: 280px;
    position: relative;
  }

  .q-category {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .q-category::before {
    content: '';
    display: inline-block;
    width: 16px; height: 1px;
    background: var(--accent2);
  }

  .q-text {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 400;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 1.75rem;
  }

  /* Opción múltiple */
  .options {
    display: grid;
    gap: 0.6rem;
  }
  .opt-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
    padding: 0.85rem 1.1rem;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(232,213,163,0.04); }
  .opt-btn .opt-letter {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 1.2rem;
  }
  .opt-btn.selected { border-color: var(--accent); background: rgba(232,213,163,0.06); }
  .opt-btn.correct { border-color: var(--correct); background: rgba(74,140,92,0.1); }
  .opt-btn.wrong { border-color: var(--wrong); background: rgba(196,75,43,0.1); }
  .opt-btn:disabled { cursor: default; }

  /* Campo abierto */
  .open-wrap { position: relative; }
  .open-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 1rem;
    padding: 0.85rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .open-input:focus { border-color: var(--accent); }
  .open-input.correct-state { border-color: var(--correct); }
  .open-input.wrong-state { border-color: var(--wrong); }

  .feedback-msg {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    margin-top: 0.5rem;
    padding: 0.5rem 0.75rem;
    display: none;
  }
  .feedback-msg.show { display: block; }
  .feedback-msg.ok { color: var(--correct); border-left: 2px solid var(--correct); }
  .feedback-msg.no { color: var(--wrong); border-left: 2px solid var(--wrong); }

  .q-footer {
    display: flex;
    justify-content: flex-end;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid var(--border);
    gap: 0.75rem;
  }
  .btn-check {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.6rem 1.4rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-check:hover { background: rgba(232,213,163,0.08); }
  .btn-next {
    background: var(--accent);
    border: none;
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.6rem 1.4rem;
    cursor: pointer;
    transition: opacity 0.15s;
    display: none;
  }
  .btn-next:hover { opacity: 0.85; }

  /* ── RESULTADOS ── */
  #results { display: none; }
  .results-header {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .results-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(232,213,163,0.05) 0%, transparent 70%);
  }
  .results-tag {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .results-name {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }
  .score-big {
    font-family: var(--font-display);
    font-size: clamp(3.5rem, 10vw, 5.5rem);
    font-weight: 900;
    line-height: 1;
    margin: 1rem 0 0.5rem;
    color: var(--text);
  }
  .score-big span { color: var(--accent); }
  .score-label {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.12em;
  }
  .verdict {
    margin-top: 1.25rem;
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-style: italic;
    color: var(--muted);
  }

  .cat-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px;
    background-color: var(--border);
  }
  .cat-cell {
    background: var(--surface);
    padding: 1rem;
    text-align: center;
  }
  .cat-name {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .cat-score {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
  }
  .cat-score.low { color: var(--accent2); }

  .review-section {
    margin-top: 0;
    border: 1px solid var(--border);
    border-top: none;
  }
  .review-toggle {
    width: 100%;
    background: var(--surface);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.9rem;
    cursor: pointer;
    transition: color 0.2s;
  }
  .review-toggle:hover { color: var(--accent); }
  .review-list { display: none; padding: 0 1.25rem 1.25rem; background: var(--surface); }
  .review-list.open { display: block; }
  .review-item {
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .review-item:last-child { border-bottom: none; }
  .ri-q { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.25rem; }
  .ri-ans { font-family: var(--font-mono); font-size: 0.8rem; }
  .ri-ans.ok { color: var(--correct); }
  .ri-ans.no { color: var(--wrong); }

  .results-actions {
    display: flex;
    gap: 0.75rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    flex-wrap: wrap;
  }

  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div class="shell">

<!-- PORTADA -->
<div id="cover">
  <div class="cover-tag">Equipo Editorial · Evaluación Interna</div>
  <h1>Prueba de<br>Ortografía</h1>
  <p>30 preguntas cronometradas · orden aleatorio<br>Tildes · B/V · C/S/Z · H muda · Mayúsculas · Palabras confusas</p>
  <div class="cover-stats">
    <div class="stat"><span class="stat-n">30</span><span class="stat-l">Preguntas</span></div>
    <div class="stat"><span class="stat-n">30s</span><span class="stat-l">Por ítem</span></div>
    <div class="stat"><span class="stat-n">5</span><span class="stat-l">Categorías</span></div>
  </div>
  <div class="name-row">
    <input type="text" id="name-input" placeholder="Tu nombre completo" autocomplete="off">
  </div>
  <button class="btn-primary" id="start-btn" disabled onclick="startQuiz()">Comenzar evaluación →</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    <div class="q-counter">Pregunta <span id="q-num">1</span> / 30</div>
    <div class="timer-wrap">
      <span class="timer-label">Tiempo</span>
      <div id="timer">30</div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="q-card fade-in" id="q-card">
    <div class="q-category" id="q-cat"></div>
    <div class="q-text" id="q-text"></div>
    <div id="q-body"></div>
    <div class="feedback-msg" id="feedback-msg"></div>
  </div>
  <div class="q-footer">
    <button class="btn-check" id="btn-check" onclick="checkAnswer()">Verificar</button>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Siguiente →</button>
  </div>
</div>

<!-- RESULTADOS -->
<div id="results">
  <div class="results-header">
    <div class="results-tag">Evaluación completada</div>
    <div class="results-name" id="res-name"></div>
    <div class="score-big" id="res-score"></div>
    <div class="score-label">PUNTOS CORRECTOS</div>
    <div class="verdict" id="res-verdict"></div>
  </div>
  <div class="cat-breakdown" id="cat-breakdown"></div>
  <div class="review-section">
    <button class="review-toggle" onclick="toggleReview()">Ver detalle de respuestas ↓</button>
    <div class="review-list" id="review-list"></div>
  </div>
  <div class="results-actions">
    <button class="btn-primary" onclick="restart()">Nueva evaluación →</button>
  </div>
</div>

</div>

<script>
const BANK = [
  // TILDES
  { cat: "Tildes y acentuación", type: "mc",
    q: "¿Cuál de estas palabras lleva tilde correctamente?",
    opts: ["exámen", "examen", "éxamen", "examén"], ans: 1 },
  { cat: "Tildes y acentuación", type: "mc",
    q: "Elige la oración con uso correcto de las tildes:",
    opts: ["El médico llegó tarde.", "El medico llegó tarde.", "El médico llego tarde.", "El medico llego tarde."], ans: 0 },
  { cat: "Tildes y acentuación", type: "open",
    q: "Escribe con tilde correcta: 'El (arbitro/árbitro) detuvo el partido'.",
    ans: ["árbitro"], hint: "árbitro" },
  { cat: "Tildes y acentuación", type: "mc",
    q: "¿Cuál es la forma correcta?",
    opts: ["¿Cómo estás?", "¿Como estás?", "¿Cómo estas?", "¿Como estas?"], ans: 0 },
  { cat: "Tildes y acentuación", type: "open",
    q: "Escribe correctamente: 'No sé (si/sí) vendrá o no'. ¿Qué palabra va en el espacio?",
    ans: ["si"], hint: "si (sin tilde, es conjunción condicional)" },
  { cat: "Tildes y acentuación", type: "mc",
    q: "¿En cuál opción se usa bien la tilde diacrítica?",
    opts: ["Él llegó solo.", "El llegó solo.", "Él llego solo.", "El llego solo."], ans: 0 },
  { cat: "Tildes y acentuación", type: "open",
    q: "¿Se escribe 'solo' o 'sólo' en esta oración según la RAE actual? 'Solo quería saber la verdad.'",
    ans: ["solo"], hint: "solo (la tilde diacrítica en 'sólo' ya no es obligatoria según la RAE)" },

  // B/V
  { cat: "B / V", type: "mc",
    q: "Elige la opción ortográficamente correcta:",
    opts: ["Hubo un problema grable.", "Hubo un problema grave.", "Ubo un problema grave.", "Huvo un problema grave."], ans: 1 },
  { cat: "B / V", type: "open",
    q: "Completa: 'El río des___ordó por las lluvias' (des + bordar).",
    ans: ["desbordó", "desbordó"], hint: "desbordó" },
  { cat: "B / V", type: "mc",
    q: "¿Cuál es la forma correcta?",
    opts: ["tubo de ensayo", "tuvo de ensayo", "tuvbo de ensayo", "tubo correcto"], ans: 0 },
  { cat: "B / V", type: "open",
    q: "Escribe la palabra correcta: '___eneno' (sustancia tóxica).",
    ans: ["veneno"], hint: "veneno (con v)" },
  { cat: "B / V", type: "mc",
    q: "Selecciona la oración sin error:",
    opts: ["Debes escribir con cuidado.", "Debes escrivir con cuidado.", "Deve escribir con cuidado.", "Deve escrivir con cuidado."], ans: 0 },
  { cat: "B / V", type: "open",
    q: "Indica la forma correcta: '¿___as comido hoy?' (verbo haber, 2.ª persona singular).",
    ans: ["has"], hint: "has (haber siempre con h)" },

  // C/S/Z
  { cat: "C / S / Z", type: "mc",
    q: "¿Cómo se escribe correctamente?",
    opts: ["conoser", "conocer", "conozer", "conocser"], ans: 1 },
  { cat: "C / S / Z", type: "open",
    q: "Escribe el plural correcto de 'lápiz'.",
    ans: ["lápices"], hint: "lápices (z → c antes de e)" },
  { cat: "C / S / Z", type: "mc",
    q: "Elige la opción correcta:",
    opts: ["La cesa es blanca.", "La ceza es blanca.", "La ceza es blanca.", "La caza es blanca."], ans: 3 },
  { cat: "C / S / Z", type: "open",
    q: "¿Cómo se escribe? 'El jue___ dictó sentencia.'",
    ans: ["juez"], hint: "juez (con z)" },
  { cat: "C / S / Z", type: "mc",
    q: "¿Cuál palabra está bien escrita?",
    opts: ["nasión", "nación", "nasion", "nacion"], ans: 1 },
  { cat: "C / S / Z", type: "open",
    q: "Escribe el verbo en primera persona del presente: '(Yo) empie___o a trabajar.' (verbo empezar).",
    ans: ["empiezo"], hint: "empiezo" },

  // H MUDA
  { cat: "H muda", type: "mc",
    q: "¿Cuál es la forma correcta?",
    opts: ["aora mismo", "ahora mismo", "ahorra mismo", "aorra mismo"], ans: 1 },
  { cat: "H muda", type: "open",
    q: "Escribe correctamente: '___ubo mucho tráfico ayer.' (verbo haber).",
    ans: ["hubo"], hint: "hubo (con h)" },
  { cat: "H muda", type: "mc",
    q: "Selecciona la oración correcta:",
    opts: ["El echo fue confirmado.", "El hecho fue confirmado.", "El hecho fue confirmado.", "El echo fue confirmado."], ans: 1 },
  { cat: "H muda", type: "open",
    q: "¿Se escribe 'ola' u 'hola' en un saludo informal?",
    ans: ["hola"], hint: "hola (con h)" },
  { cat: "H muda", type: "mc",
    q: "¿Cuál es la palabra correcta para referirse a un ser humano?",
    opts: ["ombre", "hombre", "ombre", "onbre"], ans: 1 },
  { cat: "H muda", type: "open",
    q: "Escribe correctamente: 'El ___ospital abrió a las ocho.' (edificio de salud).",
    ans: ["hospital"], hint: "hospital (con h)" },

  // PALABRAS CONFUSAS
  { cat: "Palabras confusas", type: "mc",
    q: "¿Cuál uso es correcto?",
    opts: ["No vino sino su hermano.", "No vino si no su hermano.", "No vino sinó su hermano.", "No vino si nó su hermano."], ans: 0 },
  { cat: "Palabras confusas", type: "open",
    q: "¿'Haya', 'halla' o 'aya' en: 'Espero que la ___ una solución'?",
    ans: ["haya"], hint: "haya (subjuntivo de haber)" },
  { cat: "Palabras confusas", type: "mc",
    q: "Elige la opción correcta para expresar causa:",
    opts: ["Por que llegaste tarde.", "Porque llegaste tarde.", "Por qué llegaste tarde.", "Porqué llegaste tarde."], ans: 1 },
  { cat: "Palabras confusas", type: "open",
    q: "Completa: 'La sesión ___ a cabo sin problemas.' (realizarse).",
    ans: ["llevó", "llevo"], hint: "llevó a cabo" },
  { cat: "Palabras confusas", type: "mc",
    q: "¿Cuál es el uso correcto de 'a ver' / 'haber'?",
    opts: ["Voy a haber si está listo.", "Voy a ver si está listo.", "Boi a ver si está listo.", "Voy haber si está listo."], ans: 1 },
  { cat: "Palabras confusas", type: "open",
    q: "¿'Mas' o 'más'? 'No quiero ___ problemas.'",
    ans: ["más"], hint: "más (con tilde: indica cantidad)" },
];

let questions = [];
let current = 0;
let score = 0;
let timerID;
let timeLeft;
let answered = false;
let results = [];

// Categoría → abreviatura para breakdown
const CAT_SHORT = {
  "Tildes y acentuación": "Tildes",
  "B / V": "B / V",
  "C / S / Z": "C / S / Z",
  "H muda": "H muda",
  "Palabras confusas": "Confusas"
};

document.getElementById('name-input').addEventListener('input', function() {
  document.getElementById('start-btn').disabled = this.value.trim().length < 2;
});

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  questions = shuffle([...BANK]);
  current = 0; score = 0; results = [];
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('progress-fill').style.width = ((current / 30) * 100) + '%';
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback-msg').className = 'feedback-msg';
  document.getElementById('feedback-msg').textContent = '';
  document.getElementById('btn-check').style.display = 'inline-block';
  document.getElementById('btn-next').style.display = 'none';

  const body = document.getElementById('q-body');
  body.innerHTML = '';

  if (q.type === 'mc') {
    const shuffledOpts = q.opts.map((o, i) => ({ text: o, orig: i }));
    // NO shuffleamos opciones (para no romper referencia a ans), solo las mostramos
    const div = document.createElement('div');
    div.className = 'options';
    const letters = ['A', 'B', 'C', 'D'];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.dataset.idx = i;
      btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
      btn.onclick = () => selectOption(i);
      div.appendChild(btn);
    });
    body.appendChild(div);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'open-wrap';
    const inp = document.createElement('textarea');
    inp.className = 'open-input';
    inp.id = 'open-ans';
    inp.rows = 2;
    inp.placeholder = 'Escribe tu respuesta aquí...';
    wrap.appendChild(inp);
    body.appendChild(wrap);
    inp.focus();
  }

  startTimer();
  document.getElementById('q-card').classList.remove('fade-in');
  void document.getElementById('q-card').offsetWidth;
  document.getElementById('q-card').classList.add('fade-in');
}

let selectedOpt = null;

function selectOption(idx) {
  if (answered) return;
  selectedOpt = idx;
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.remove('selected');
    if (parseInt(b.dataset.idx) === idx) b.classList.add('selected');
  });
}

function startTimer() {
  clearInterval(timerID);
  timeLeft = 30;
  const el = document.getElementById('timer');
  el.textContent = timeLeft;
  el.className = '';
  timerID = setInterval(() => {
    timeLeft--;
    el.textContent = timeLeft;
    if (timeLeft <= 8) el.className = 'urgent';
    if (timeLeft <= 0) {
      clearInterval(timerID);
      autoExpire();
    }
  }, 1000);
}

function autoExpire() {
  if (answered) return;
  answered = true;
  const q = questions[current];
  showFeedback(false, q.type === 'mc' ? `Correcto: ${q.opts[q.ans]}` : `Correcto: ${q.hint}`);
  if (q.type === 'mc') markMC(null, q.ans);
  else markOpen(false);
  recordResult(false);
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
}

function checkAnswer() {
  if (answered) return;
  const q = questions[current];
  clearInterval(timerID);
  answered = true;

  if (q.type === 'mc') {
    if (selectedOpt === null) {
      showFeedback(false, 'Selecciona una opción.');
      answered = false;
      startTimer();
      return;
    }
    const correct = selectedOpt === q.ans;
    if (correct) score++;
    markMC(selectedOpt, q.ans);
    showFeedback(correct, correct ? '¡Correcto!' : `Incorrecto. La respuesta es: ${q.opts[q.ans]}`);
    recordResult(correct);
  } else {
    const val = (document.getElementById('open-ans')?.value || '').trim().toLowerCase();
    const correct = q.ans.some(a => a.toLowerCase() === val || val.includes(a.toLowerCase()));
    if (correct) score++;
    markOpen(correct);
    showFeedback(correct, correct ? '¡Correcto!' : `Correcto: ${q.hint}`);
    recordResult(correct, val);
  }

  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
  selectedOpt = null;
}

function markMC(chosen, correct) {
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    const i = parseInt(b.dataset.idx);
    if (i === correct) b.classList.add('correct');
    else if (i === chosen && chosen !== correct) b.classList.add('wrong');
  });
}

function markOpen(correct) {
  const inp = document.getElementById('open-ans');
  if (inp) {
    inp.disabled = true;
    inp.classList.add(correct ? 'correct-state' : 'wrong-state');
  }
}

function showFeedback(ok, msg) {
  const el = document.getElementById('feedback-msg');
  el.textContent = msg;
  el.className = `feedback-msg show ${ok ? 'ok' : 'no'}`;
}

function recordResult(correct, userAns) {
  const q = questions[current];
  results.push({ q: q.q, cat: q.cat, correct, hint: q.hint || (q.opts ? q.opts[q.ans] : ''), userAns });
}

function nextQuestion() {
  current++;
  if (current >= 30) { showResults(); return; }
  loadQuestion();
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  const name = document.getElementById('name-input').value.trim();
  document.getElementById('res-name').textContent = name;
  document.getElementById('res-score').innerHTML = `<span>${score}</span> / 30`;

  const pct = (score / 30) * 100;
  const verdicts = [
    [0, 50, 'Área de mejora significativa. ¡A repasar las reglas!'],
    [50, 70, 'Nivel básico. Hay conceptos que afianzar.'],
    [70, 85, 'Buen desempeño. Algunos detalles por pulir.'],
    [85, 95, 'Muy bien. Dominio sólido de la ortografía.'],
    [95, 101, '¡Excelente! Dominio sobresaliente.'],
  ];
  const v = verdicts.find(([lo, hi]) => pct >= lo && pct < hi);
  document.getElementById('res-verdict').textContent = v ? v[2] : '';

  // Breakdown por categoría
  const cats = {};
  results.forEach(r => {
    if (!cats[r.cat]) cats[r.cat] = { total: 0, ok: 0 };
    cats[r.cat].total++;
    if (r.correct) cats[r.cat].ok++;
  });
  const bd = document.getElementById('cat-breakdown');
  bd.innerHTML = '';
  Object.entries(cats).forEach(([cat, d]) => {
    const cell = document.createElement('div');
    cell.className = 'cat-cell';
    const pctCat = Math.round((d.ok / d.total) * 100);
    cell.innerHTML = `<div class="cat-name">${CAT_SHORT[cat] || cat}</div>
      <div class="cat-score${pctCat < 60 ? ' low' : ''}">${d.ok}/${d.total}</div>`;
    bd.appendChild(cell);
  });

  // Review list
  const rl = document.getElementById('review-list');
  rl.innerHTML = '';
  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `<div class="ri-q">${i + 1}. ${r.q}</div>
      <div class="ri-ans ${r.correct ? 'ok' : 'no'}">${r.correct ? '✓ Correcto' : `✗ Incorrecto — Respuesta: ${r.hint}`}</div>`;
    rl.appendChild(div);
  });
}

function toggleReview() {
  const rl = document.getElementById('review-list');
  rl.classList.toggle('open');
}

function restart() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('cover').style.display = 'block';
  document.getElementById('name-input').value = '';
  document.getElementById('start-btn').disabled = true;
  selectedOpt = null;
}
</script>
</body>
</html>
